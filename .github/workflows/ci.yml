name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm build
      - run: pnpm test

  gateway:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/gateway
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: services/gateway/go.sum
      - run: go vet ./...
      - run: go test ./...
      - name: Build gateway binary
        run: go build -o /tmp/gateway ./cmd/gateway
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: tests/requirements.txt
      - name: Run Robot api suites against the gateway
        working-directory: .
        run: |
          pip install -r tests/requirements.txt
          /tmp/gateway &
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:8080/healthz >/dev/null && break
            sleep 1
          done
          robot --include api --outputdir tests/results tests/robot/api
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: robot-api-results
          path: tests/results/

  robot-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: tests/requirements.txt
      - run: pnpm install --frozen-lockfile
      - run: pip install -r tests/requirements.txt
      - run: pnpm build
      - name: Serve frontend preview
        run: |
          pnpm --filter @iatg/web preview --port 4173 &
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:4173/ >/dev/null && break
            sleep 1
          done
      - name: Run Robot smoke suites
        run: |
          robot --include smoke \
            --variable APP_URL:http://127.0.0.1:4173 \
            --outputdir tests/results tests/robot/web
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: robot-smoke-results
          path: tests/results/

