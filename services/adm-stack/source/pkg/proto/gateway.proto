syntax = "proto3";

package proto;

option go_package = "github.com/adm/pkg/proto";

// GatewayService handles chat completions and tool execution
service GatewayService {
  // ChatCompletion handles OpenAI-compatible chat requests
  rpc ChatCompletion(ChatCompletionRequest) returns (stream ChatCompletionResponse);

  // ExecuteTool executes a specific tool call
  rpc ExecuteTool(ToolCallRequest) returns (ToolCallResponse);

  // HealthCheck returns service health
  rpc HealthCheck(HealthCheckRequest) returns (HealthCheckResponse);
}

message ChatCompletionRequest {
  string session_id = 1;
  string model = 2;
  repeated Message messages = 3;
  repeated ToolDefinition tools = 4;
  double temperature = 5;
  int32 max_tokens = 6;
  bool stream = 7;
}

message ChatCompletionResponse {
  string id = 1;
  string model = 2;
  repeated Choice choices = 3;
  Usage usage = 4;
}

message Choice {
  int32 index = 1;
  Message message = 2;
  string finish_reason = 3;
}

message Message {
  string role = 1;
  string content = 2;
  repeated ToolCall tool_calls = 3;
}

message ToolCall {
  string id = 1;
  string type = 2;
  FunctionCall function = 3;
}

message FunctionCall {
  string name = 1;
  string arguments = 2;
}

message ToolDefinition {
  string type = 1;
  FunctionDefinition function = 2;
}

message FunctionDefinition {
  string name = 1;
  string description = 2;
  string parameters = 3; // JSON Schema string
}

message Usage {
  int32 prompt_tokens = 1;
  int32 completion_tokens = 2;
  int32 total_tokens = 3;
}

message ToolCallRequest {
  string session_id = 1;
  string tool_name = 2;
  string arguments = 3; // JSON string
}

message ToolCallResponse {
  bool success = 1;
  string result = 2;
  string error = 3;
  int64 execution_time_ms = 4;
}

message HealthCheckRequest {}

message HealthCheckResponse {
  bool healthy = 1;
  string version = 2;
  int64 uptime_seconds = 3;
}
