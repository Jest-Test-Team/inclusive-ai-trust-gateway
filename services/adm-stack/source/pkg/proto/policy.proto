syntax = "proto3";

package proto;

option go_package = "github.com/adm/pkg/proto";

// PolicyService handles OPA policy evaluation
service PolicyService {
  // EvaluatePolicy evaluates a request against OPA policies
  rpc EvaluatePolicy(EvaluateRequest) returns (EvaluateResponse);

  // LoadPolicy loads or updates a Rego policy
  rpc LoadPolicy(LoadPolicyRequest) returns (LoadPolicyResponse);

  // GetPolicy returns a specific policy
  rpc GetPolicy(GetPolicyRequest) returns (GetPolicyResponse);

  // ListPolicies returns all loaded policies
  rpc ListPolicies(ListPoliciesRequest) returns (ListPoliciesResponse);

  // DeletePolicy removes a policy
  rpc DeletePolicy(DeletePolicyRequest) returns (DeletePolicyResponse);

  // HealthCheck returns service health
  rpc HealthCheck(HealthCheckRequest) returns (HealthCheckResponse);
}

message EvaluateRequest {
  string policy_id = 1;
  string input = 2; // JSON input for OPA
  map<string, string> context = 3;
}

message EvaluateResponse {
  bool allowed = 1;
  string decision = 2; // JSON decision
  repeated string reasons = 3;
  int64 evaluation_time_ns = 4;
}

message LoadPolicyRequest {
  string policy_id = 1;
  string rego_source = 2;
  string description = 3;
  map<string, string> annotations = 4;
}

message LoadPolicyResponse {
  bool success = 1;
  string policy_id = 2;
  string message = 3;
  repeated string validation_errors = 4;
}

message GetPolicyRequest {
  string policy_id = 1;
}

message GetPolicyResponse {
  string policy_id = 1;
  string rego_source = 2;
  string description = 3;
  map<string, string> annotations = 4;
  int64 created_at_ns = 5;
  int64 updated_at_ns = 6;
}

message ListPoliciesRequest {}

message ListPoliciesResponse {
  repeated PolicyInfo policies = 1;
}

message PolicyInfo {
  string policy_id = 1;
  string description = 2;
  map<string, string> annotations = 3;
  int64 created_at_ns = 4;
  int64 updated_at_ns = 5;
}

message DeletePolicyRequest {
  string policy_id = 1;
}

message DeletePolicyResponse {
  bool success = 1;
  string message = 2;
}

message HealthCheckRequest {}

message HealthCheckResponse {
  bool healthy = 1;
  string version = 2;
  int64 uptime_seconds = 3;
}
