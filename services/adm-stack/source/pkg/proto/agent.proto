syntax = "proto3";

package proto;

option go_package = "github.com/adm/pkg/proto";

// PlannerService plans tool execution sequences
service PlannerService {
  rpc PlanExecution(PlanRequest) returns (PlanResponse);
  rpc HealthCheck(HealthCheckRequest) returns (HealthCheckResponse);
}

// ExecutorService executes tool calls in sandboxed environments
service ExecutorService {
  rpc ExecuteTool(ToolExecutionRequest) returns (ToolExecutionResponse);
  rpc ExecuteBatch(BatchExecutionRequest) returns (BatchExecutionResponse);
  rpc GetContainerStatus(ContainerStatusRequest) returns (ContainerStatusResponse);
  rpc KillContainer(KillContainerRequest) returns (KillContainerResponse);
  rpc HealthCheck(HealthCheckRequest) returns (HealthCheckResponse);
}

// SummarizerService generates conversation summaries
service SummarizerService {
  rpc Summarize(SummaryRequest) returns (SummaryResponse);
  rpc HealthCheck(HealthCheckRequest) returns (HealthCheckResponse);
}

message PlanRequest {
  string session_id = 1;
  string user_prompt = 2;
  repeated Message context = 3;
  repeated ToolDefinition available_tools = 4;
  string model = 5;
}

message PlanResponse {
  string plan_id = 1;
  repeated PlannedStep steps = 2;
  string reasoning = 3;
  double confidence = 4;
}

message PlannedStep {
  int32 step_number = 1;
  string tool_name = 2;
  string arguments = 3; // JSON string
  string depends_on = 4; // previous step ID
  string rationale = 5;
}

message ToolExecutionRequest {
  string session_id = 1;
  string plan_id = 2;
  string tool_name = 3;
  string arguments = 4; // JSON string
  map<string, string> env = 5; // environment variables
  int32 timeout_seconds = 6;
}

message ToolExecutionResponse {
  string execution_id = 1;
  bool success = 2;
  string result = 3;
  string error = 4;
  int64 execution_time_ms = 5;
  repeated SyscallEvent syscalls = 6;
}

message BatchExecutionRequest {
  string session_id = 1;
  string plan_id = 2;
  repeated PlannedStep steps = 3;
  bool parallel = 4;
}

message BatchExecutionResponse {
  string batch_id = 1;
  repeated ToolExecutionResponse results = 2;
  bool all_succeeded = 3;
}

message ContainerStatusRequest {
  string session_id = 1;
}

message ContainerStatusResponse {
  string container_id = 1;
  string status = 2;
  int64 uptime_seconds = 3;
  double cpu_usage = 4;
  double memory_usage_mb = 5;
}

message KillContainerRequest {
  string session_id = 1;
  string reason = 2;
}

message KillContainerResponse {
  bool killed = 1;
  string message = 2;
}

message SummaryRequest {
  string session_id = 1;
  repeated Message conversation = 2;
  repeated ToolExecutionResponse tool_results = 3;
  int32 max_length = 4;
}

message SummaryResponse {
  string summary = 1;
  repeated string key_decisions = 2;
  repeated string action_items = 3;
}

message Message {
  string role = 1;
  string content = 2;
  repeated ToolCall tool_calls = 3;
}

message ToolCall {
  string id = 1;
  string type = 2;
  FunctionCall function = 3;
}

message FunctionCall {
  string name = 1;
  string arguments = 2;
}

message ToolDefinition {
  string type = 1;
  FunctionDefinition function = 2;
}

message FunctionDefinition {
  string name = 1;
  string description = 2;
  string parameters = 3;
}

message SyscallEvent {
  string event_type = 1;
  string process_name = 2;
  string path = 3;
  repeated string args = 4;
  int64 timestamp_ns = 5;
}

message HealthCheckRequest {}

message HealthCheckResponse {
  bool healthy = 1;
  string version = 2;
  int64 uptime_seconds = 3;
}
