syntax = "proto3";

package proto;

option go_package = "github.com/adm/pkg/proto";

// WatchdogService controls the endpoint watchdog daemon
service WatchdogService {
  // GetStatus returns watchdog status
  rpc GetStatus(StatusRequest) returns (WatchdogStatus);

  // AddSessionFilter adds egress filters for a session
  rpc AddSessionFilter(AddFilterRequest) returns (FilterResponse);

  // RemoveSessionFilter removes filters for a session
  rpc RemoveSessionFilter(RemoveFilterRequest) returns (FilterResponse);

  // KillSession kills all processes for a session
  rpc KillSession(KillSessionRequest) returns (KillSessionResponse);

  // AddToBlocklist adds an endpoint to the blocklist
  rpc AddToBlocklist(BlocklistRequest) returns (BlocklistResponse);

  // RemoveFromBlocklist removes an endpoint from the blocklist
  rpc RemoveFromBlocklist(BlocklistRequest) returns (BlocklistResponse);

  // GetSyscallLog returns recent syscall events for a session
  rpc GetSyscallLog(SyslogRequest) returns (SyslogResponse);

  // ReloadPolicy triggers policy reload from control plane
  rpc ReloadPolicy(ReloadPolicyRequest) returns (ReloadPolicyResponse);

  // HealthCheck returns daemon health
  rpc HealthCheck(HealthCheckRequest) returns (HealthCheckResponse);
}

message StatusRequest {}

message WatchdogStatus {
  bool running = 1;
  string platform = 2;          // darwin, windows, linux
  string version = 3;
  int64 uptime_seconds = 4;
  int32 active_sessions = 5;
  int64 syscalls_intercepted_total = 6;
  int64 connections_blocked_total = 7;
  int32 filters_active = 8;
}

message AddFilterRequest {
  string session_id = 1;
  repeated FilterRule rules = 2;
}

message FilterRule {
  string rule_id = 1;
  string protocol = 2;         // tcp, udp, icmp
  string direction = 3;        // inbound, outbound
  string remote_addr = 4;      // CIDR or specific IP
  int32 remote_port = 5;
  string action = 6;           // allow, deny
  int32 priority = 7;
}

message FilterResponse {
  bool success = 1;
  int32 filters_added = 2;
  string message = 3;
}

message RemoveFilterRequest {
  string session_id = 1;
  repeated string rule_ids = 2;
}

message KillSessionRequest {
  string session_id = 1;
  string reason = 2;
}

message KillSessionResponse {
  bool killed = 1;
  int32 processes_killed = 2;
  string message = 3;
}

message BlocklistRequest {
  string endpoint = 1; // IP or CIDR
  string reason = 2;
  int32 ttl_seconds = 3; // 0 = permanent
}

message BlocklistResponse {
  bool success = 1;
  string message = 2;
}

message SyslogRequest {
  string session_id = 1;
  int64 since_ns = 2;
  int32 limit = 3;
  string event_type = 4; // filter by type
}

message SyslogResponse {
  repeated SyscallEntry events = 1;
  int32 total_count = 2;
}

message SyscallEntry {
  string event_id = 1;
  string event_type = 2;
  string process_name = 3;
  string process_path = 4;
  repeated string arguments = 5;
  string result = 6;
  int64 timestamp_ns = 7;
  string session_id = 8;
}

message ReloadPolicyRequest {}

message ReloadPolicyResponse {
  bool success = 1;
  int32 policies_loaded = 2;
  string message = 3;
}

message HealthCheckRequest {}

message HealthCheckResponse {
  bool healthy = 1;
  string version = 2;
  int64 uptime_seconds = 3;
}
