# Secrets UI; see infra/choreo/README.md.
schemaVersion: 1.2

endpoints:
  - name: erh
    displayName: ERH Fairness Engine
    service:
      basePath: /
      port: 8000
    type: REST
    networkVisibilities:
      - Public
