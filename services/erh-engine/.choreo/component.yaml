# ERH engine — Choreo Service component.
# Build context MUST be services/erh-engine (not repo root).
# Endpoint port must match the container listen port (PORT=8080).
schemaVersion: 1.2

endpoints:
  - name: erh
    displayName: ERH Fairness Engine
    service:
      basePath: /
      port: 8080
    type: REST
    networkVisibilities:
      - Public
